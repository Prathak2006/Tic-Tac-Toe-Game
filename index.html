<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="hide msg-container" >
    <p class="msg">Winner </p>
     <button id="new-btn">New Game</button>
  </div>
    <main>
      <h1> Tic Tac Toe Game </h1>
      <div class="players">
  <div id="playerO">Player O: <span id="scoreO">0</span></div>
  <div id="playerX">Player X: <span id="scoreX">0</span></div>
</div>
<div class="match-info">
  <p>Match: <span id="currentMatch">0</span> / <span id="totalMatch">0</span></p>
</div>

<div class="match-setup" id="setup-box">
  <input type="number" id="match-count" placeholder="No. of Matches">
  <button id="start-btn">Start Game</button>
</div>
      <div class="container">
        <div class="game">
         <button class="box"></button>
         <button class="box"></button>
         <button class="box"></button>
         <button class="box"></button>
         <button class="box"></button>
         <button class="box"></button>
         <button class="box"></button>
         <button class="box"></button>
         <button class="box"></button>
      </div>

      </div>
      <button id="reset-btn">Reset Game</button>
      

    </main>

    <script src="app.js"></script>
</body>

</html>
